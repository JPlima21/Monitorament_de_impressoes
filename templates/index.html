<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Impressora</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="dashboard">

    <header>
        <h1>Monitor de Impressora</h1>
        <nav class="top-nav" aria-label="Navegacao principal">
            <a href="/" class="top-nav-link active" aria-current="page">Dashboard</a>
            <a href="/graficos" class="top-nav-link">Graficos</a>
        </nav>
    </header>

    <section class="resumo-status">
        <div class="card resumo-card resumo-total">
            <span class="resumo-label">Total</span>
            <strong class="resumo-valor" id="total-impressoras">0</strong>
        </div>
        <div class="card resumo-card resumo-online">
            <span class="resumo-label">Online</span>
            <strong class="resumo-valor" id="total-online">0</strong>
        </div>
        <div class="card resumo-card resumo-offline">
            <span class="resumo-label">Offline</span>
            <strong class="resumo-valor" id="total-offline">0</strong>
        </div>
    </section>

    <div class="content" id="content-container">
        <p style="text-align: center; padding: 20px;">Carregando impressoras...</p>
    </div>

</div>

<script src="/static/js/dashboard.js"></script>

</body>
</html>
